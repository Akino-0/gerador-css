<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Gerador de CSS</title>
</head>

<body>
    <h1>Gerador de CSS ⚡️</h1>
    <p>Descreva o que você imagina e veja a mágica acontecer</p>

    <div class="sugestoes-flutuantes">
        <div class="sugestoes-track" id="sugestoes-chips"></div>
    </div>

    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando, botão vermelho pulsante..."></textarea>

    <button class="botao-gerar">Gerar CSS ⚡️</button>

    <div class="painel-resultados">
        <div class="area-codigo">
            <h2>Código CSS</h2>
            <div class="bloco-codigo" id="bloco-codigo">Seu código CSS aparecerá aqui...</div>
        </div>

        <div class="area-preview">
            <h2>Preview</h2>
            <div class="resultado-preview" id="resultado-preview">
                <div class="elemento-preview">Preview</div>
            </div>
        </div>
    </div>

    <footer class="rodape">
        <a href="documentacao.html" class="botao-docs">📚 Documentação & Tutorial</a>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
